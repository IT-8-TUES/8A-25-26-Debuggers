<!DOCTYPE html>
<html lang="en">
<head>

    <title>Security</title>
    <link rel="stylesheet" href="rosen_style.css">
</head>
<body>
    <header>
        <h1>Security</h1>

            <table>

                </tr>
                <tr>
                    <td><button onclick="alert('Biometric Login is on')">Biometric Login</button></td>
                </tr>

                </tr>
                <tr>
                    <td><button onclick="alert('Analytics is on')">Analytics</button></td>
                </tr>
            </table>
        </section>

    <footer>
        <button onclick="window.location.href='homepage.html'">🏠︎</button>
        <button onclick="window.location.href='settings.html'">Settings</button>

</html>
