<!DOCTYPE html>
<html lang="bg">

<head>
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Sign Up</h1>
    </header>

    <main>

        <section>

            <p>
                Create your new account.
            </p>

            <table>

                <tr>

                    <td>

                        <h6>Username</h6>

                        <input 
                            type="text"
                            id="signupUsername"
                            placeholder="Enter username"
                        >

                    </td>

                </tr>

                <tr>

                    <td>

                        <h6>Email</h6>

                        <input 
                            type="email"
                            id="signupEmail"
                            placeholder="Enter email"
                        >

                    </td>

                </tr>

                <tr>

                    <td>

                        <h6>Password</h6>

                        <input 
                            type="password"
                            id="signupPassword"
                            placeholder="Enter password"
                        >

                    </td>

                </tr>

                <tr>

                    <td>

                        <h6>Confirm Password</h6>

                        <input 
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm password"
                        >

                    </td>

                </tr>

                <tr>

                    <td>

                        <button type="button" onclick="signUp()">
                            Sign Up
                        </button>

                    </td>

                </tr>

            </table>

            <p>
                Already have an account?
            </p>

            <button type="button" onclick="goToLogin()">
                Log In
            </button>

            <button type="button" onclick="goHome()">
                Home
            </button>

        </section>

    </main>

    <footer>

        <p>© 2026 Kartio</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
