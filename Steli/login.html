<!DOCTYPE html>
<html lang="bg">
<head>
    <title>Login Page</title>
    <link rel="icon" href="#">
</head>

<body>
    <header>
        <h1>Login</h1>
    </header>

    <nav>
        <a href="#">Home</a>
    </nav>

    <main>
        <section>
            <h3>Login Form</h3>

            <p>
                Please <em>enter</em> your account details.
            </p>

            <table>
                <tr>
                    <td>
                        <h6>Username</h6>
                        <input type="text" placeholder="Enter username">
                    </td>

                </tr>

                <tr>

                    <td>
                        <h6>Password</h6>
                        <input type="password" placeholder="Enter password">
                    </td>

                </tr>
            </table>
        </section>
    </main>
</body>
</html>
