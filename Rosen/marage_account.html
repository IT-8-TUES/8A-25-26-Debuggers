<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Account</title>
    <link rel="stylesheet" href="rosen_style.css">
</head>
<body>
    <header>
        <h1>Your Account</h1>
    </header>

    <main>
        <section>
            <h6>Display Name</h6>
            <input id="field-name" placeholder="Default User" value="Default User">

            <h6>Email</h6>
            <input id="field-email" placeholder="user@gmail.com" value="user@gmail.com">

            <h6>Phone</h6>
            <input placeholder="+1 000 000 0000" value="+1 000 000 0000">

            <table>
                <tr>
                    <td><button onclick="alert('Changes Saved!')">Save Changes</button></td>
                </tr>
            </table>
        </section>
    </main>

    <footer>
        <button onclick="window.location.href='homepage.html'">🏠︎</button>
        <button onclick="window.location.href='settings.html'">Settings</button>
    </footer>
    <script src="rosen_script.js"></script>
</body>
</html>
