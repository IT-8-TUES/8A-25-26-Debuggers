<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preferences</title>
    </head>
<body>
<div class="phone-wrap">
  <div class="shell">
    <div class="screen">
      <div class="sbar"></div>
      <header class="hdr">
        <div class="back-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
        <div class="htitle" style="font-size:18px;">Preferences</div>
      </header>
      <div class="inner-body">
        <div class="card">
          <div class="card-row"><span class="card-label">Dark Mode</span><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="card-row"><span class="card-label">Push Notifications</span><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
        </div>
        <div class="inner-title" style="font-size:14px;margin-top:4px;">Display</div>
        <div class="card">
          <div class="card-row"><span class="card-label">Default Currency</span><span class="card-value">USD</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
