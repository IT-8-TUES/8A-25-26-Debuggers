<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help - Wallet App</title>
    </head>
<body>
<div class="phone-wrap">
  <div class="shell">
    <div class="screen">
      <div class="sbar"></div>
      <header class="hdr">
        <div class="back-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
        <div class="htitle" style="font-size:18px;">Help</div>
      </header>
      <div class="inner-body">
        <div class="card">
          <div class="card-row" style="cursor:pointer;"><span class="card-label" style="color:#e8e8e8;">How do I add a card?</span></div>
          <div class="card-row" style="cursor:pointer;"><span class="card-label" style="color:#e8e8e8;">Why was my payment declined?</span></div>
          <div class="card-row" style="cursor:pointer;"><span class="card-label" style="color:#e8e8e8;">How do I transfer funds?</span></div>
          <div class="card-row" style="cursor:pointer;"><span class="card-label" style="color:#e8e8e8;">Can I use Wallet* abroad?</span></div>
        </div>
        <div class="inner-title" style="font-size:14px;margin-top:4px;">Contact Support</div>
        <div class="card">
          <div class="card-row"><span class="card-label">Email</span><span class="card-value" style="color:#4a9eff;">support@wallet.app</span></div>
          <div class="card-row"><span class="card-label">Response time</span><span class="card-value">~2 hours</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
